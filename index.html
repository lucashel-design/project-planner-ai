<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Project Planner AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Project Planner AI</h1>

    <textarea id="input" placeholder="Descreve o projeto..."></textarea>
    <button id="generateBtn">Gerar Plano</button>

    <div id="output"></div>

    <div id="assistantArea" class="assistant-area">
      <h2>Pergunta sobre o passo atual</h2>
      <textarea id="questionInput" placeholder="Ex.: Como defino o meu público-alvo?"></textarea>
      <button id="askBtn">Perguntar</button>
      <div id="assistantOutput"></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
