<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Project Planner AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h2>Meus Projetos</h2>
      <div id="projectsList"></div>
    </aside>

    <main class="main-content">
      <div class="container">
        <h1>Project Planner AI</h1>

        <div id="output"></div>

        <div id="createProjectArea">
          <textarea id="input" placeholder="Descreva o projeto..."></textarea>
          <button id="startBriefingBtn">Começar projeto</button>
        </div>

        <div id="assistantArea" class="assistant-area">
          <h4>Pergunte ou Responda Aqui</h4>
          <div id="assistantOutput"></div>
          <textarea id="questionInput" placeholder="Escreva aqui..."></textarea>
          <button id="askBtn">Enviar</button>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
